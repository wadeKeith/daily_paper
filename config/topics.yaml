report:
  repo_name: daily-ai-paper-digest
  pipeline_version: v1.0.0
  timezone: Asia/Shanghai
  lookback_days: 1
  highlight_limit: 5
  selected_limit_per_topic: 12
  other_relevant_limit: 8
  arxiv_max_results_per_group: 80
  arxiv_polite_delay_seconds: 3.2
  huggingface_recent_papers_limit: 100
  huggingface_daily_papers_limit: 60
  user_agent: daily-ai-paper-digest/0.1.0 (https://github.com/your-org/daily-ai-paper-digest)
  include_if:
    - 与 VLA / 世界模型 / 多模态大模型 / 智能体直接相关
    - 或对这些方向的方法、训练、评测、系统化落地有明显参考价值
  exclude_if:
    - 主题过远
    - 纯行业新闻，无论文主体
    - 重复条目
    - 仅有转发，无原始论文页
  ranking_formula: 0.35*topic_relevance + 0.20*novelty + 0.20*evidence_strength + 0.15*resource_readiness + 0.10*discussion_value
  ranking_scale: 0-5

llm:
  enabled: false
  provider: openai_responses
  api_key_env: OPENAI_API_KEY
  api_base: https://api.openai.com/v1
  model: ""
  model_env: IDEA_MODEL
  reasoning_effort: low
  timeout_seconds: 90
  max_daily_highlights: 5
  max_aggregate_papers: 12

aggregation:
  weekly_top_papers: 10
  monthly_top_papers: 15
  top_days_limit: 7
  top_tags_limit: 8

